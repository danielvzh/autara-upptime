name: Arch Block Count Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check block count progression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check block count
        run: |
          STATE_FILE="history/arch-block-count-state.json"
          STATUS_FILE="api/arch-block-progression/status.json"
          mkdir -p "$(dirname "$STATUS_FILE")"

          RESPONSE=$(curl -sk -X POST https://rpc.testnet.arch.network \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"id","method":"get_block_count","params":[]}' \
            --max-time 30 2>/dev/null || echo "FAILED")

          if [ "$RESPONSE" = "FAILED" ]; then
            echo "RPC request failed"
            echo '{"progressing":false,"block_count":0,"error":"rpc_unreachable","updated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > "$STATUS_FILE"
            git config user.name "upptime-bot"
            git config user.email "upptime-bot@autara.finance"
            git add "$STATUS_FILE"
            git diff --cached --quiet || git commit -m "Arch RPC unreachable [skip ci]"
            git pull --rebase || true
            git push || true
            exit 0
          fi

          CURRENT_COUNT=$(echo "$RESPONSE" | jq -r '.result // empty')

          if [ -z "$CURRENT_COUNT" ]; then
            echo "No result in response: $RESPONSE"
            echo '{"progressing":false,"block_count":0,"error":"invalid_response","updated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > "$STATUS_FILE"
            git config user.name "upptime-bot"
            git config user.email "upptime-bot@autara.finance"
            git add "$STATUS_FILE"
            git diff --cached --quiet || git commit -m "Arch RPC invalid response [skip ci]"
            git pull --rebase || true
            git push || true
            exit 0
          fi

          echo "Current block count: $CURRENT_COUNT"

          if [ -f "$STATE_FILE" ]; then
            PREV_COUNT=$(jq -r '.block_count' "$STATE_FILE")
          else
            PREV_COUNT=0
          fi

          echo "Previous block count: $PREV_COUNT"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$CURRENT_COUNT" -gt "$PREV_COUNT" ]; then
            echo "Block count is progressing"
            echo "{\"block_count\": $CURRENT_COUNT, \"updated_at\": \"$NOW\"}" > "$STATE_FILE"
            echo "{\"progressing\":true,\"block_count\":$CURRENT_COUNT,\"updated_at\":\"$NOW\"}" > "$STATUS_FILE"
          else
            echo "Block count has NOT increased ($PREV_COUNT -> $CURRENT_COUNT)"
            LAST_UPDATE=$(jq -r '.updated_at // empty' "$STATE_FILE" 2>/dev/null || echo "$NOW")
            echo "{\"progressing\":false,\"block_count\":$CURRENT_COUNT,\"stalled_since\":\"$LAST_UPDATE\",\"updated_at\":\"$NOW\"}" > "$STATUS_FILE"
          fi

          git config user.name "upptime-bot"
          git config user.email "upptime-bot@autara.finance"
          git add "$STATE_FILE" "$STATUS_FILE"
          git diff --cached --quiet || git commit -m "Update Arch block count: $CURRENT_COUNT [skip ci]"
          git pull --rebase || true
          git push || true
