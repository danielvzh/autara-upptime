name: Arch Block Count Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check block count progression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check block count
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          STATE_FILE="history/arch-block-count-state.json"
          ISSUE_LABEL="arch-rpc-stalled"

          RESPONSE=$(curl -sk -X POST https://rpc.testnet.arch.network \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"id","method":"get_block_count","params":[]}' \
            --max-time 30 2>/dev/null || echo "FAILED")

          if [ "$RESPONSE" = "FAILED" ]; then
            echo "RPC request failed, skipping this run"
            exit 0
          fi

          CURRENT_COUNT=$(echo "$RESPONSE" | jq -r '.result // empty')

          if [ -z "$CURRENT_COUNT" ]; then
            echo "No result in response: $RESPONSE"
            exit 0
          fi

          echo "Current block count: $CURRENT_COUNT"

          if [ -f "$STATE_FILE" ]; then
            PREV_COUNT=$(jq -r '.block_count' "$STATE_FILE")
          else
            PREV_COUNT=0
          fi

          echo "Previous block count: $PREV_COUNT"

          if [ "$CURRENT_COUNT" -gt "$PREV_COUNT" ]; then
            echo "Block count is progressing"

            echo "{\"block_count\": $CURRENT_COUNT, \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > "$STATE_FILE"

            git config user.name "upptime-bot"
            git config user.email "upptime-bot@autara.finance"
            git add "$STATE_FILE"
            git diff --cached --quiet || git commit -m "Update Arch block count: $CURRENT_COUNT [skip ci]"
            git push || true

            OPEN_ISSUE=$(gh issue list --repo "$REPO" --label "$ISSUE_LABEL" --state open --json number -q '.[0].number' 2>/dev/null)
            if [ -n "$OPEN_ISSUE" ]; then
              gh issue close "$OPEN_ISSUE" --repo "$REPO" \
                --comment "Resolved — block count is progressing again (now at $CURRENT_COUNT)."
              echo "Closed issue #$OPEN_ISSUE"
            fi
          else
            echo "Block count has NOT increased ($PREV_COUNT -> $CURRENT_COUNT)"

            OPEN_ISSUE=$(gh issue list --repo "$REPO" --label "$ISSUE_LABEL" --state open --json number -q '.[0].number' 2>/dev/null)
            if [ -z "$OPEN_ISSUE" ]; then
              gh issue create --repo "$REPO" \
                --title "Arch RPC Testnet: block count stalled at $CURRENT_COUNT" \
                --body "The Arch RPC Testnet block count has not increased. Stuck at **$CURRENT_COUNT** since $(jq -r '.updated_at' "$STATE_FILE" 2>/dev/null || echo 'unknown')." \
                --label "$ISSUE_LABEL"
              echo "Opened new stall issue"
            else
              echo "Stall issue #$OPEN_ISSUE already open"
            fi
          fi
